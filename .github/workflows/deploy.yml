# Template from: https://github.com/YouvenZ/Jupyterbook-template/blob/main/.github/workflows/deploy.yml
name: deploy-book

on:
  push:
    branches:
      - main

env:
  BASE_URL: /${{ github.event.repository.name }}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install jupyter-book

      - name: Check Jupyter Book version
        run: jupyter-book --version

      - name: Build the book
        run: jupyter-book build mynewbook

      - name: Debug - Check if HTML build exists
        run: ls -la mynewbook/_build/html || echo "HTML build directory missing!"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: "github-pages"
          path: "mynewbook/_build/html"

      - name: Debug - List uploaded artifacts
        run: ls -la ${{ runner.temp }}/pages-artifact/ || echo "No artifacts uploaded!"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: "github-pages"